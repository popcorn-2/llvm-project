# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Build Popcorn-LLVM for macOS
runs-on: self-hosted

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: macos-13

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -G Ninja -B ${{github.workspace}}/build -C ${{github.workspace}}/cmake/caches/DistributionPopcorn.cmake ${{github.workspace}}/llvm

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --target stage2-distribution

    - name: Package
      run: |
        mkdir ${{github.workspace}}/pkg
        DESTDIR="${{github.workspace}}/pkg" cmake --build ${{github.workspace}}/build --target stage2-install-distribution

    - name: Archive
      uses: actions/upload-artifact@v4
      with:
        name: "popcorn2-llvm-macos-13-x86_64"
        path: ${{github.workspace}}/pkg/
